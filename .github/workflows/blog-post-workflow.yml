name: Latest Blog Posts

on:
    schedule:
        # Runs every 6 hours
        - cron: "0 */6 * * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    update-readme:
        name: Update README with latest articles
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Pull latest posts from feed
              uses: gautamkrishnar/blog-post-workflow@v1
              with:
          feed_list: "https://www.alekseialeinikov.com/feed-en.xml"
          max_post_count: 5
          template: "- [**$title**]($url) &nbsp;·&nbsp; <sub>$date</sub>$newline"
                  commit_message: "chore: update latest blog posts"
