name: Latest Blog Posts

on:
    schedule:
        # Runs once a day at 06:00 UTC
        - cron: "0 6 * * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    update-readme:
        name: Update README with latest articles
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Pull latest posts from feed
              uses: gautamkrishnar/blog-post-workflow@v1
              with:
                  feed_list: "https://www.alekseialeinikov.com/feed-en.xml"
                  max_post_count: 10
                  template: "$newline- [**$title**]($url) &nbsp;·&nbsp; <sub>$date</sub>"
                  date_format: "mmm d, yyyy"
                  commit_message: "chore: update latest blog posts"
